# This is a basic workflow to help you get started with Actions

name: python pytest

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  teste_pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.x
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r pytestrequirements.txt
    - name: Test with pytest
      run: |
  build-e-push:
    runs-on: ubuntu-latest # O sistema operacional do "runner"
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
  
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Variável Secreta
          password: ${{ secrets.DOCKER_TOKEN }}    # Variável Secreta (Token de Acesso)
  
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: . # Usa a pasta raiz como contexto de build
          push: true # Faz o push (envio) para o registro após o build
          tags: |
            samissac/minha-app-jwt:latest
            samissac/minha-app-jwt:${{ github.sha }}
      - name: Rodar docker compose
        run: 
          docker-compose up -d
          pip install pytest pytest-cov
          pytest
