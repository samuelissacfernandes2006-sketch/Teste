

name: python pytest

on:

  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  teste_pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.x
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r pytestrequirements.txt
    - name: Test with pytest
      run: |
  build-e-push:
    runs-on: ubuntu-latest # O sistema operacional do "runner"
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
  
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Variável Secreta
          password: ${{ secrets.DOCKER_TOKEN }}    # Variável Secreta (Token de Acesso)
  
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: . 
          push: true 
          tags: |
            samissac/minha-app-teste:latest
            samissac/minha-app-teste:${{ github.sha }}
      - name: Rodar docker compose
        run: 
          docker-compose up -d
