

name: python pytest

on:

  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build-e-push:
    runs-on: ubuntu-latest # O sistema operacional do "runner"
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
  
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Variável Secreta
          password: ${{ secrets.DOCKER_TOKEN }}    # Variável Secreta (Token de Acesso)
  
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: . 
          push: true 
          tags: |
            samissac/minha-app-teste:latest
            samissac/minha-app-teste:${{ github.sha }}
      - name: Rodar docker compose
        run: 
          docker-compose up -d
