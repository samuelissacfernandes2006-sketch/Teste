# This is a basic workflow to help you get started with Actions

name: python pytest

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest # O sistema operacional do "runner"
    
    # 3. Passos (steps)
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Variável Secreta
          password: ${{ secrets.DOCKER_TOKEN }}    # Variável Secreta (Token de Acesso)

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Extrair metadados (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: samissac/minha-app-jwt
          tags: |
            type=raw,value=latest,enable={{is_default}}
            type=sha,format=short
            type=semver,pattern={{version}} # Cria tags como 'v1.0.0'

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: . # Usa a pasta raiz como contexto de build
          push: true # Faz o push (envio) para o registro após o build
          tags: ${{ steps.meta.outputs.tags }} # Usa as tags geradas na etapa anterior
          labels: ${{ steps.meta.outputs.labels }} # Usa os labels gerados
      
    
  
  teste_pytest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.x
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r pytestrequirements.txt
    - name: Test with pytest
      run: |
        pip install pytest pytest-cov
        pytest
